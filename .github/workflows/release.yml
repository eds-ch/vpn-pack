name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: manager/ui/package-lock.json

      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Validate tag and resolve version
        id: ver
        run: |
          set -euo pipefail
          if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "FATAL: tag '$TAG' is not a valid release tag (expected vX.Y.Z[-suffix])" >&2
            exit 1
          fi
          ver="${TAG#v}"
          file_ver=$(head -1 VERSION)
          if [ "$file_ver" != "$ver" ]; then
            echo "FATAL: tag '$TAG' (semver '$ver') does not match VERSION file ('$file_ver')" >&2
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          if printf '%s\n' "$TAG" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and package
        run: make package

      - name: Generate checksums
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        working-directory: build/dist
        run: |
          set -euo pipefail
          sha256sum "vpn-pack-${VERSION}.tar.gz" > checksums.txt

      - name: Sign artifacts (cosign keyless via GitHub OIDC)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        working-directory: build/dist
        run: |
          set -euo pipefail
          archive="vpn-pack-${VERSION}.tar.gz"
          cosign sign-blob --yes \
            --bundle "${archive}.cosign.bundle" \
            "$archive"
          cosign sign-blob --yes \
            --bundle "checksums.txt.cosign.bundle" \
            "checksums.txt"

      - name: Compose release notes
        run: |
          set -euo pipefail
          ts_ver=$(awk -F'[[:space:]]*:=[[:space:]]*' '/^TAILSCALE_VERSION/{print $2; exit}' Makefile)
          {
            printf 'Tailscale %s for UniFi Cloud Gateway devices.\n\n' "$ts_ver"
            printf '## Install\n\n'
            printf '```bash\n'
            printf 'curl -fsSL https://raw.githubusercontent.com/eds-ch/vpn-pack/main/get.sh | bash\n'
            printf '```\n\n'
            printf '## Signature verification\n\n'
            printf 'Release artifacts are signed via GitHub Actions keyless OIDC '
            printf '(`sigstore/cosign`); the pinned identity regexp and OIDC issuer '
            printf 'are defined in `get.sh` (`COSIGN_IDENTITY_REGEXP` / '
            printf '`COSIGN_OIDC_ISSUER`). See README for the manual verify command.\n'
          } > build/dist/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          PRERELEASE: ${{ steps.ver.outputs.prerelease }}
        working-directory: build/dist
        run: |
          set -euo pipefail
          args=()
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "$TAG" \
            "vpn-pack-${VERSION}.tar.gz" \
            "vpn-pack-${VERSION}.tar.gz.cosign.bundle" \
            "checksums.txt" \
            "checksums.txt.cosign.bundle" \
            "../../get.sh" \
            --title "vpn-pack $TAG" \
            --notes-file release-notes.md \
            "${args[@]}"
